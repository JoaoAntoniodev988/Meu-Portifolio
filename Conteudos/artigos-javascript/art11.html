<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamentos da Linguagem</title>
    <link rel="stylesheet" href="styleferramentas.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/c99245ec2d.js" crossorigin="anonymous"></script>
    
<style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --fundo: #f5f5f5;
    --texto: #000000;
    --cor-principal: #f7df1e;
    --fundo-card: #ffffff;
    --cor-destaque: #fff1a2;
}

/* Definições gerais para o corpo do app */
body {
    font-family: 'Montsserat';
    line-height: 1.2;
    background-color: var(--fundo);
}

header {
    padding: 10px;
    position: sticky;
    top: 0;
    background-color: var(--cor-principal);
    font-family: 'Inter', sans-serif;
    font-size: small;
    border-bottom: 4px solid;
}

header p {
    margin: 0;
}

main {
    background-color: var(--fundo-card);
    margin: 10px 10px 60px 10px;
    padding:10px;
}

main h1, h2, h3, p {
    margin: 10px;
}

main p {
    font-size: 11pt;
}

main h2 {
    font-size: 15pt;
    padding: 10px;
    border-radius: 10px;
    background-color: #f7df1e;
}

main h3 {
    font-size: 12pt;
}


main ul, li {
    margin: 10px 0px 10px 15px;
    font-size: 11pt;

}

#destaque {
    background-color: var(--cor-principal);
    margin: 0px 10px;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 11pt
}  

/*Navegação de baixo*/
nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 9999;/* Garante que fica sempre por cima do conteúdo */
    padding-top: 10px;
    background-color: #f7df1e;
    box-shadow: 2px 2px 8px 5px #22222221;
    border-top: 2px solid ; 
}

#menu ul {
    list-style: none;
    display: flex;
    justify-content: space-around; /* Distribui os 5 itens igualmente pela largura */
    align-items: center;
    height: 100%;/* Alinha verticalmente no centro da barra */
}

#menu a {
    display: flex;
    flex-direction: column;/* Alinha os elementos em linha vertical (coluna) */
    align-items: center;/* Centraliza o ícone e o texto horizontalmente entre si */
    text-decoration: none;/* Remove o sublinhado dos links */
    gap: 8px;
    font-size: small;
    color: #000000;
}
</style>
</head>
<body>
       <header class="telas-pequenas">
        <h1>JavaScript</h1>
        <p>Desenvolvimento Web</p>
    </header>

    <main>
            <section id="poximos-passos">
            <h2>Os Proximos passos em Js</h2>
                <ol>
                    <li> Função </li>
                    <li>objetos</li>
                    <li>modularização</li>
                    <li> RegEx</li>
                    <li>JSON</li>
                    <li>AJAX</li>
                    <li> NodeJS</li>
                </ol>
            </section>
    </main>

     <nav id="menu">
        <ul>
            <li>
                <a href="index.html"><i class="fa-regular fa-house"></i><span class="menu-texto">Início</span>
            </a></li>

            <li>
                <a href="ferramentas.html"><i class="fa-solid fa-brain"></i><span class="menu-texto">Ferramentas</span></a></li>

            <li>
                <a href="projectos.html"><i class="fa-solid fa-diagram-project"></i><span class="menu-texto">Projectos</span></a></li>

        </ul>
    </nav>
</body>
