<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MktLocal - Divulgação Simples para Pequenos Negócios</title>
    <link rel="stylesheet" href="estlo.css">
</head>
<body>

    <main class="login-container">
        <!-- Lado Esquerdo: Identidade Visual e Mensagem -->
        <section class="brand-section">
            <div class="logo">
                <!-- Vamos simular o ícone azul da imagem crm1.jpg com CSS depois -->
                <div class="logo-icon"></div>
                <div class="brand-circle"></div>
                <h1>Ambu<span>lante</span></h1>
            </div>
            <h2>Marketing digital profissional para o seu negócio, sem complicações.</h2>
            <p>Conecte suas redes e comece a atrair clientes da sua região hoje mesmo.</p>
        </section>

        <!-- Lado Direito: A Ação de Conexão (Inspirado na sua ideia!) -->
        <section class="action-section">
            <div class="action-card">
                <h3>Comece Agora</h3>
                <p>Para criar anúncios e gerenciar seus clientes, conecte a sua página empresarial.</p>
                
                <!-- Botão de Conexão Direta com o Facebook -->
                <button id="btn-facebook-connect" class="btn-fb">
                    <svg class="fb-icon" viewBox="0 0 24 24">
                        <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.8z"/>
                    </svg>
                    Conectar com o Facebook
                </button>

                <p class="security-notice">🔒 Conexão segura e oficial via Meta Business.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
