<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Empreendedor - Meu SaaS</title>
    <style>
        /* CONFIGURAÇÕES GERAIS MOBILE-FIRST */
       /* CONFIGURAÇÕES GERAIS COM CENTRALIZAÇÃO TOTAL */
    /* CONFIGURAÇÕES GERAIS COM CENTRALIZAÇÃO TOTAL (VERTICAL E HORIZONTAL) */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            
            /* 1. Ativa o Flexbox para podermos alinhar os elementos */
            display: flex;
            
            /* 2. Define a direção do alinhamento como coluna */
            flex-direction: column; 
            
            /* 3. Centraliza na HORIZONTAL (eixo cruzado) */
            align-items: center; 
            
            /* 4. Centraliza na VERTICAL (eixo principal) */
            justify-content: center; 
            
            /* 5. Força o body a ter, no mínimo, a altura total da janela do navegador */
            min-height: 100vh; 
        }
        .celular-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px; /* Simula a largura de um celular moderno */
            overflow: hidden;
            margin-bottom: 20px;
        }
        .header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }
        .conteudo {
            padding: 20px;
        }
        
        /* ESTILOS DE COMPONENTES REUTILIZÁVEIS */
        .tela {
            display: none; /* Esconde todas as telas por padrão */
        }
        .tela.ativa {
            display: block; /* Mostra apenas a tela que tiver a classe 'ativa' */
        }
        .campo {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
            font-size: 0.9rem;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccd0d5;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #f5f6f7;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-principal {
            background-color: #007bff;
            color: white;
        }
        .btn-facebook {
            background-color: #1877f2;
            color: white;
        }

        /* DETALHES EXCLUSIVOS */
        .saldo-box {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #b2d4ff;
        }
        .saldo-valor {
            font-size: 1.8rem;
            font-weight: bold;
            color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="celular-container">
        <div class="header">Anúncio Fácil 🚀</div>
        <div class="conteudo">

            <div id="tela-login" class="tela ativa">
                <h3 style="margin-top: 0;">Bem-vindo!</h3>
                <p style="color: #666; font-size: 0.9rem; margin-bottom: 25px;">
                    Conecte sua conta para começar a anunciar de forma simples.
                </p>
               <button class="btn-facebook" onclick="conectarFacebook()">
                    Entrar com o Facebook da Empresa 🔵
                </button>
            </div>

            <div id="tela-carteira" class="tela">
                <h3 style="margin-top: 0;">Sua Carteira Digital 💳</h3>
                <div class="saldo-box">
                    <span style="font-size: 0.9rem; color: #555;">Saldo Disponível</span>
                    <div class="saldo-valor">R$ 0,00</div>
                </div>
                <div class="campo">
                    <label for="valor-recarga">Quanto deseja adicionar de saldo?</label>
                    <input type="number" id="valor-recarga" placeholder="Ex: 50.00">
                </div>
                <button class="btn-principal" onclick="mudarTela('tela-formulario')">
                    Gerar PIX de Recarga ⚡
                </button>
            </div>

            <div id="tela-formulario" class="tela">
                <h3 style="margin-top: 0;">Criar Novo Anúncio ✨</h3>
                
                <div class="campo">
                    <label for="foto">Passo 1: Foto do seu Produto</label>
                    <input type="file" id="foto" accept="image/*">
                </div>

                <div class="campo">
                    <label for="descricao">Passo 2: O que você está vendendo?</label>
                    <textarea id="descricao" rows="3" placeholder="Ex: Bolo de pote por R$10. Peça já!"></textarea>
                </div>

                <div class="campo">
                    <label for="orcamento">Passo 3: Orçamento do Anúncio</label>
                    <select id="orcamento">
                        <option value="30">R$ 30,00 (Alcança aprox. 2.000 pessoas)</option>
                        <option value="50" selected>R$ 50,00 (Alcança aprox. 4.500 pessoas)</option>
                        <option value="100">R$ 100,00 (Alcança aprox. 10.000 pessoas)</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="localizacao">Onde quer mostrar o anúncio?</label>
                    <input type="text" id="localizacao" placeholder="Ex: Meu Bairro ou Minha Cidade">
                </div>

                <button class="btn-principal" onclick="alert('Campanha enviada com sucesso! (Simulação)')">
                    Publicar Anúncio Rápido 🚀
                </button>
            </div>

        </div>
    </div>

    <script>
        // Função para mudar de tela (Gerenciamento de Estado)
        function mudarTela(idNovaTela) {
            document.querySelectorAll('.tela').forEach(tela => {
                tela.classList.remove('ativa');
            });
            document.getElementById(idNovaTela).classList.add('ativa');
        }

        // SIMULAÇÃO DO LOGIN REAL DA META API
        function conectarFacebook() {
            // 1. Pegamos o botão na tela
            const btn = document.querySelector('.btn-facebook');
            
            // 2. Mudamos o estado do botão para "Carregando" (Excelente para UX!)
            btn.disabled = true;
            btn.innerHTML = "Conectando à Meta... ⏳";
            btn.style.backgroundColor = "#555";

            // 3. Simulamos o tempo de espera da API (2 segundos)
            setTimeout(() => {
                // Simulando que a Meta nos devolveu o nome da página do cliente
                const nomeDaPaginaDoCliente = "Pizzaria do Bairro";
                
                alert(`Sucesso! Conectado à página: ${nomeDaPaginaDoCliente}`);
                
                // 4. Avança para a tela da carteira
                mudarTela('tela-carteira');
                
                // Opcional: Atualizar o cabeçalho com o nome do cliente logado
                document.querySelector('.header').innerHTML = `Painel - ${nomeDaPaginaDoCliente} 🍕`;
                
            }, 2000); // 2000 milissegundos = 2 segundos
        }
    </script>

</body>
</html>
