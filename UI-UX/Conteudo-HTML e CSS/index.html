<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
                /* Layout Geral da Página */
        .site-grid {
        display: grid;
        grid-template-columns: 250px 1fr; /* Barra lateral e conteúdo principal */
        gap: 20px;
        background-color: aquamarine;
        }

        /* Card de Produto (Item do Grid) que usa Flexbox internamente */
        .product-card {
        display: flex;
        flex-direction: column;
        justify-content: space-between; /* Empurra o botão para o final */
        height: 100%;
        background-color: bisque;
        }
    </style>
</head>
<body>
    <div class="site-grid"> <header>Cabeçalho</header>
  <main class="products-grid"> <div class="product-card"> <img>
      <h3>Nome do Produto</h3>
      <button>Comprar</button>
    </div>

  </main>
</div>
</body>
</html>
